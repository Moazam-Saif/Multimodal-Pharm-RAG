[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "pillrag"
version = "0.1.0"
description = "Multimodal RAG pipeline for pharmaceutical pill identification"
requires-python = ">=3.11"
dependencies = [
    # We'll fill this in phase by phase, adding each dependency
    # only when we actually start using it. Keeping this list
    # accurate as we go (rather than dumping everything in now)
    # means anyone reading it later knows exactly what's really used.
]

[tool.setuptools.packages.find]
where = ["src"]
